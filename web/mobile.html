<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>صندوق مهر۱۱۰ — نمای موبایل</title>
<link rel="stylesheet" href="tokens.css" />
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<style>
  body { background: var(--surface-2); }
  .wrap { padding: 40px 32px 64px; }
  .head { max-width: 1100px; margin: 0 auto 28px; }
  .head h1 { margin: 0; font-family: var(--serif); font-weight: 600; font-size: 28px; color: var(--ink); line-height: 1.3; }
  .head p { margin: 8px 0 0; font-size: 14px; color: var(--ink-3); line-height: 1.8; max-width: 70ch; }
  .rail {
    display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; align-items: flex-start;
    max-width: 1100px; margin: 0 auto;
  }
  .phone { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .phone-label {
    font-size: 13.5px; font-weight: 600; color: var(--ink-2);
    display: inline-flex; align-items: center; gap: 8px; white-space: nowrap;
  }
  .phone-label .dot { width: 7px; height: 7px; border-radius: 99px; background: var(--accent); }
  .bezel {
    width: 408px; padding: 11px; background: oklch(0.22 0.01 65); border-radius: 44px;
    box-shadow: 0 1px 2px rgba(40,30,20,.18), 0 18px 50px rgba(40,30,20,.20);
  }
  .screen {
    width: 386px; height: 800px; border-radius: 34px; overflow: hidden; background: var(--paper);
    position: relative;
  }
  .screen iframe { width: 386px; height: 800px; border: 0; display: block; }
  .open-link {
    font-size: 12.5px; color: var(--ink-3); text-decoration: none; display: inline-flex; align-items: center; gap: 5px;
  }
  .open-link:hover { color: var(--accent); }
</style>
</head>
<body>
<script src="api.js"></script>
<div class="wrap">
  <div class="head">
    <h1>نمای موبایل</h1>
    <p>هر صفحه واکنش‌گرا (mobile-first) است و در عرض موبایل به‌صورت تک‌ستونی و کارت‌محور درمی‌آید. این صفحه‌ها همان فایل‌های واقعی‌اند که در عرض ۳۹۰ پیکسل نمایش داده می‌شوند — همان نسخه‌ای که روی گوشی دیده می‌شود.</p>
  </div>
  <div class="rail" id="rail"></div>
</div>

<script>
  const PAGES = [
    ['داشبورد مدیر', 'dashboard.html'],
    ['صورت‌حساب عضو', 'statement.html'],
    ['افزودن عضو', 'add-member.html'],
    ['ثبت پرداخت', 'record-payment.html'],
    ['ثبت وام', 'record-loan.html'],
    ['ترتیب وام‌گیرندگان', 'loan-order.html'],
  ];
  const rail = document.getElementById('rail');
  PAGES.forEach(([label, src]) => {
    const phone = document.createElement('div');
    phone.className = 'phone';
    phone.innerHTML =
      '<div class="phone-label"><span class="dot"></span>' + label + '</div>' +
      '<div class="bezel"><div class="screen"><iframe src="' + src + '"></iframe></div></div>' +
      '<a class="open-link" href="' + src + '" target="_blank">باز کردن صفحهٔ کامل ↗</a>';
    rail.appendChild(phone);
  });
</script>
</body>
</html>
