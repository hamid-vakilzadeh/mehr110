<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>صندوق مهر۱۱۰ — ورود</title>
<link rel="stylesheet" href="tokens.css" />
<script src="firebase-config.js"></script>
<script>
  /* DEMO mode: if a localStorage session exists, skip the login screen.
     LIVE mode is handled below once Firebase Auth state resolves. */
  try { if (!window.FB_LIVE && localStorage.getItem('ff_auth')) location.replace('dashboard.html'); } catch (e) {}
</script>
<style>
  body { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
  .stage {
    width: 100%; max-width: 420px;
  }
  .brand { display: flex; flex-direction: column; align-items: center; gap: 14px; margin-bottom: 28px; }
  .logo { width: 56px; height: 56px; border-radius: 16px; background: var(--accent); display: grid; place-items: center; }
  .brand h1 { margin: 0; font-family: var(--serif); font-weight: 600; font-size: 28px; color: var(--ink); line-height: 1.3; white-space: nowrap; }
  .brand p { margin: 2px 0 0; font-size: 13.5px; color: var(--ink-3); }
  .card {
    background: var(--surface); border: 1px solid var(--hair); border-radius: var(--radius);
    padding: 30px 30px 26px; box-shadow: var(--shadow);
  }
  .card h2 { margin: 0 0 2px; font-family: var(--serif); font-weight: 600; font-size: 20px; color: var(--ink); }
  .card .sub { margin: 0 0 22px; font-size: 13px; color: var(--ink-3); }
  label { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
  label span { font-size: 13px; font-weight: 600; color: var(--ink); }
  .ipt {
    height: 46px; padding: 0 14px; border-radius: 11px; border: 1px solid var(--hair);
    background: var(--surface); font-family: var(--sans); font-size: 14px; color: var(--ink); width: 100%;
  }
  .ipt::placeholder { color: var(--ink-3); }
  .ipt:hover { border-color: var(--ink-3); }
  .ipt:focus { border-color: var(--accent); outline: none; }
  .ipt.ltr { direction: ltr; text-align: right; font-variant-numeric: tabular-nums; }
  .err { font-size: 12.5px; color: var(--warn); margin: -8px 0 14px; display: none; align-items: center; gap: 6px; }
  .err.show { display: flex; }
  .btn {
    width: 100%; height: 48px; border: none; border-radius: 11px; background: var(--accent);
    color: var(--surface); font-family: var(--sans); font-size: 15px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px; margin-top: 4px;
  }
  .btn:hover { opacity: 0.94; }
  .row { display: flex; align-items: center; justify-content: space-between; margin: 2px 0 18px; }
  .remember { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-2); cursor: pointer; user-select: none; }
  .remember input { width: 16px; height: 16px; accent-color: var(--accent); }
  .link { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 500; }
  .demo { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--hair-2); font-size: 12px; color: var(--ink-3); line-height: 1.8; text-align: center; }
  .demo b { color: var(--ink-2); font-weight: 600; }
  .foot { text-align: center; font-size: 12px; color: var(--ink-3); margin-top: 22px; display: inline-flex; align-items: center; gap: 6px; justify-content: center; width: 100%; }
</style>
</head>
<body>
<div class="stage">
  <div class="brand">
    <div class="logo">
      <svg width="29" height="29" viewBox="0 0 24 24" fill="none" stroke="var(--surface)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="7" rx="7" ry="3"/><path d="M5 7v5c0 1.7 3.1 3 7 3s7-1.3 7-3V7"/><path d="M5 12v5c0 1.7 3.1 3 7 3s7-1.3 7-3v-5"/></svg>
    </div>
    <div style="text-align:center;">
      <h1>صندوق مهر۱۱۰</h1>
      <p>پنل مدیریت — ورود مدیر</p>
    </div>
  </div>

  <form class="card" id="form" novalidate>
    <h2>ورود به حساب</h2>
    <p class="sub">برای دیدن داشبورد صندوق وارد شوید.</p>

    <label>
      <span>ایمیل</span>
      <input class="ipt ltr" id="user" type="email" placeholder="you@example.com" autocomplete="username" />
    </label>
    <label>
      <span>گذرواژه</span>
      <input class="ipt" id="pass" type="password" placeholder="گذرواژهٔ خود را وارد کنید" autocomplete="current-password" />
    </label>
    <div class="err" id="err">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3.2 22 19.5H2L12 3.2Z"/><line x1="12" y1="9.5" x2="12" y2="14"/><circle cx="12" cy="16.7" r="0.6" fill="currentColor" stroke="none"/></svg>
      <span>ایمیل و گذرواژه را وارد کنید.</span>
    </div>

    <div class="row">
      <label class="remember"><input type="checkbox" id="remember" checked /> مرا به خاطر بسپار</label>
    </div>

    <button class="btn" type="submit">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h4a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-4"/><polyline points="9 8 13 12 9 16"/><line x1="13" y1="12" x2="3" y2="12"/></svg>
      ورود
    </button>
  </form>

  <div class="foot">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="10.5" width="16" height="10.5" rx="2.2"/><path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"/></svg>
    اتصال امن — دسترسی فقط برای مدیر صندوق
  </div>
</div>

<script src="api.js"></script>
<script>
  var form = document.getElementById('form');
  var err = document.getElementById('err');
  var errMsg = err.querySelector('span');

  // LIVE mode: if Firebase already has a session, skip straight to the dashboard.
  if (window.FB_LIVE && window.API && window.API.authReady) {
    window.API.authReady.then(function (user) { if (user) location.replace('dashboard.html'); });
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var u = document.getElementById('user').value.trim();
    var p = document.getElementById('pass').value.trim();
    if (!u || !p) { if (errMsg) errMsg.textContent = 'ایمیل و گذرواژه را وارد کنید.'; err.classList.add('show'); return; }
    err.classList.remove('show');
    // API.signIn handles both modes: demo writes a localStorage session;
    // live calls Firebase signInWithEmailAndPassword (use email + password).
    window.API.signIn(u, p).then(function () {
      location.replace('dashboard.html');
    }).catch(function (ex) {
      if (errMsg) errMsg.textContent = 'ورود ناموفق بود. ایمیل و گذرواژه را بررسی کنید.';
      err.classList.add('show');
      console.error(ex);
    });
  });
</script>
</body>
</html>
